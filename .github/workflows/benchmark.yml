name: Benchmark (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional benchmark tag (used for website/results/benchmarks-<tag>.json)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: "0.11.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare liboqs cache prefix
        run: |
          set -euo pipefail
          liboqs_prefix="${GITHUB_WORKSPACE}/.cache/liboqs/${LIBOQS_VERSION}/${RUNNER_OS}-${RUNNER_ARCH}"
          liboqs_cache_key="liboqs-${LIBOQS_VERSION}-${RUNNER_OS}-${RUNNER_ARCH}"
          mkdir -p "${liboqs_prefix}"
          {
            echo "LIBOQS_PREFIX=${liboqs_prefix}"
            echo "LIBOQS_CACHE_KEY=${liboqs_cache_key}"
            echo "PKG_CONFIG_PATH=${liboqs_prefix}/lib/pkgconfig:${liboqs_prefix}/lib64/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
            echo "CMAKE_PREFIX_PATH=${liboqs_prefix}${CMAKE_PREFIX_PATH:+:${CMAKE_PREFIX_PATH}}"
            echo "LD_LIBRARY_PATH=${liboqs_prefix}/lib:${liboqs_prefix}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Cache liboqs
        id: cache-liboqs
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBOQS_PREFIX }}
          key: ${{ env.LIBOQS_CACHE_KEY }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev zlib1g-dev libargon2-dev liblzma-dev ffmpeg

      - name: Install liboqs
        run: |
          chmod +x .github/scripts/install-liboqs.sh
          INSTALL_PREFIX="${LIBOQS_PREFIX}" .github/scripts/install-liboqs.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Run full benchmark suite
        env:
          BASEFWX_OBFUSCATE: "1"
          ALLOW_BAKED_PUB: "0"
          BASEFWX_BENCH_RESULTS_DIR: results
          BASEFWX_RELEASE_TAG: ${{ inputs.tag }}
          BASEFWX_ENABLE_JMG_VIDEO: "0"
          BASEFWX_TEST_REQUIRE_ARGON2: "ON"
          BASEFWX_TEST_REQUIRE_OQS: "ON"
          BASEFWX_TEST_REQUIRE_LZMA: "ON"
        run: |
          if [[ -z "${BASEFWX_RELEASE_TAG}" ]]; then
            BASEFWX_RELEASE_TAG="manual-$(date -u +%Y%m%d-%H%M%S)"
            echo "BASEFWX_RELEASE_TAG=$BASEFWX_RELEASE_TAG" >> "$GITHUB_ENV"
          fi
          chmod +x scripts/test_all.sh
          ./scripts/test_all.sh --fbench

      - name: Verify live benchmark coverage
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          bench_path = Path("results/benchmarks-latest.json")
          if not bench_path.exists():
              raise SystemExit("Missing results/benchmarks-latest.json")

          data = json.loads(bench_path.read_text(encoding="utf-8"))
          tests = {
              entry.get("label"): entry.get("times", {})
              for entry in data.get("tests", [])
              if entry.get("label")
          }
          required = {
              "fwxAES-live": {"python", "cpp", "java"},
              "kFAe": {"python"},
          }
          missing = []
          for label, langs in required.items():
              times = tests.get(label)
              if not isinstance(times, dict):
                  missing.append(f"{label} (label missing)")
                  continue
              for lang in sorted(langs):
                  value = times.get(lang)
                  if not isinstance(value, int) or value <= 0:
                      missing.append(f"{label}:{lang}")
          if missing:
              raise SystemExit(f"Missing benchmark labels: {', '.join(missing)}")
          print("Live benchmark coverage OK")
          PY

      - name: Build basefwxcrypto JNI shared library
        run: |
          set -euo pipefail
          cmake -S cpp -B build/jni \
            -DBASEFWX_BUILD_CLI=OFF \
            -DBASEFWX_BUILD_JNI=ON \
            -DBASEFWX_REQUIRE_ARGON2=OFF \
            -DBASEFWX_REQUIRE_OQS=OFF \
            -DBASEFWX_REQUIRE_LZMA=OFF
          cmake --build build/jni --target basefwxcrypto -j

      - name: Build Java jar
        run: |
          set -euo pipefail
          cd java
          gradle --no-daemon build

      - name: Run Java dual-backend benchmark
        env:
          JAR: java/build/libs/basefwx-java.jar
          JNI_LIB_DIR: build/jni
        run: |
          set -euo pipefail
          mkdir -p results

          # Two payload sizes give us a small/large profile without exploding runtime.
          for size in 1048576 16777216; do
            label_size="$(numfmt --to=iec --suffix=B "${size}")"

            pure_out="$(java -Dbasefwx.useJNI=false -cp "${JAR}" \
              com.fixcraft.basefwx.FwxAESBenchmark "${size}" 5)"
            jni_out="$(java -Dbasefwx.useJNI=true \
              -Djava.library.path="${JNI_LIB_DIR}" \
              -cp "${JAR}" \
              com.fixcraft.basefwx.FwxAESBenchmark "${size}" 5)"
            echo "--- ${label_size} pure-java ---"
            echo "${pure_out}"
            echo "--- ${label_size} jni ---"
            echo "${jni_out}"

            python3 .github/scripts/bench_java_backends.py \
              --size "${size}" \
              --pure-output <(printf '%s' "${pure_out}") \
              --jni-output  <(printf '%s' "${jni_out}") \
              --append results/java-backends-${BASEFWX_RELEASE_TAG}.json
          done

          cp -f results/java-backends-${BASEFWX_RELEASE_TAG}.json \
                results/java-backends-latest.json

      - name: Publish benchmark results to DEV
        run: |
          set -euo pipefail
          git fetch --no-tags origin DEV
          git checkout -B DEV origin/DEV
          mkdir -p website/results
          cp -f results/benchmarks-*.json website/results/
          cp -f results/benchmarks-*.txt  website/results/
          cp -f results/java-backends-*.json website/results/ 2>/dev/null || true

          # Maintain a small index of every benchmark snapshot the website knows
          # about, so the benchmark page can offer a history dropdown without
          # the user having to guess release tags.
          python3 .github/scripts/bench_history_index.py \
            --results-dir website/results \
            --output      website/results/index.json

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add website/results/
          if git diff --cached --quiet; then
            echo "No benchmark updates to publish."
            exit 0
          fi
          git commit -m "Update benchmark results (${BASEFWX_RELEASE_TAG:-manual})"
          git push origin HEAD:DEV
