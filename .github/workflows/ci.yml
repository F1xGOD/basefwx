name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: "0.11.0"
      LIBOQS_PREFIX: ${{ github.workspace }}/.cache/liboqs/0.11.0/${{ runner.os }}-${{ runner.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version metadata
        run: python3 scripts/check_version_sync.py

      - name: Prepare liboqs cache prefix
        run: |
          set -euo pipefail
          mkdir -p "${LIBOQS_PREFIX}"
          {
            echo "PKG_CONFIG_PATH=${LIBOQS_PREFIX}/lib/pkgconfig:${LIBOQS_PREFIX}/lib64/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
            echo "CMAKE_PREFIX_PATH=${LIBOQS_PREFIX}${CMAKE_PREFIX_PATH:+:${CMAKE_PREFIX_PATH}}"
            echo "LD_LIBRARY_PATH=${LIBOQS_PREFIX}/lib:${LIBOQS_PREFIX}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Cache liboqs
        id: cache-liboqs
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBOQS_PREFIX }}
          key: liboqs-${{ env.LIBOQS_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev zlib1g-dev libargon2-dev liblzma-dev ffmpeg

      - name: Install liboqs
        run: |
          chmod +x .github/scripts/install-liboqs.sh
          INSTALL_PREFIX="${LIBOQS_PREFIX}" .github/scripts/install-liboqs.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run fast test suite
        env:
          BASEFWX_OBFUSCATE: "1"
          ALLOW_BAKED_PUB: "0"
          BASEFWX_ENABLE_JMG_VIDEO: "0"
          BASEFWX_TEST_REQUIRE_ARGON2: "ON"
          BASEFWX_TEST_REQUIRE_OQS: "ON"
          BASEFWX_TEST_REQUIRE_LZMA: "ON"
        run: |
          chmod +x scripts/test_all.sh
          ./scripts/test_all.sh --fast

      - name: Verify live/no-archive tests in CI
        run: |
          PY_BIN="./.venv/bin/python"
          if [ ! -x "$PY_BIN" ]; then
            PY_BIN="python3"
          fi
          "$PY_BIN" -m unittest \
            python.tests.test_basefwx.BaseFWXUnitTests.test_live_stream_roundtrip_chunked \
            python.tests.test_basefwx.BaseFWXUnitTests.test_live_stream_tamper_rejected \
            python.tests.test_basefwx.BaseFWXUnitTests.test_jmg_image_no_archive_roundtrip_valid_image \
            python.tests.test_basefwx.BaseFWXUnitTests.test_jmg_video_disabled_by_default \
            python.tests.test_basefwx.BaseFWXUnitTests.test_probe_streams_ignores_attached_pic_video \
            python.tests.test_basefwx.BaseFWXUnitTests.test_ffmpeg_video_codec_args_clamps_huge_bitrate \
            python.tests.test_basefwx.BaseFWXUnitTests.test_kfm_xor_auto_falls_back_without_cupy
