name: "CodeQL Advanced"

on:
  push:
    branches:
      - "main"
      - "results/**"
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "19 10 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    env:
      LIBOQS_VERSION: "0.11.0"
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none
          - language: java
            build-mode: manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Prepare liboqs cache prefix
        if: matrix.language == 'c-cpp'
        run: |
          set -euo pipefail
          liboqs_prefix="${GITHUB_WORKSPACE}/.cache/liboqs/${LIBOQS_VERSION}/${RUNNER_OS}-${RUNNER_ARCH}"
          liboqs_cache_key="liboqs-${LIBOQS_VERSION}-${RUNNER_OS}-${RUNNER_ARCH}"
          mkdir -p "${liboqs_prefix}"
          {
            echo "LIBOQS_PREFIX=${liboqs_prefix}"
            echo "LIBOQS_CACHE_KEY=${liboqs_cache_key}"
            echo "PKG_CONFIG_PATH=${liboqs_prefix}/lib/pkgconfig:${liboqs_prefix}/lib64/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
            echo "CMAKE_PREFIX_PATH=${liboqs_prefix}${CMAKE_PREFIX_PATH:+:${CMAKE_PREFIX_PATH}}"
            echo "LD_LIBRARY_PATH=${liboqs_prefix}/lib:${liboqs_prefix}/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          } >> "${GITHUB_ENV}"

      - name: Cache liboqs
        if: matrix.language == 'c-cpp'
        id: cache-liboqs
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBOQS_PREFIX }}
          key: ${{ env.LIBOQS_CACHE_KEY }}

      - name: Install C++ deps
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make libssl-dev zlib1g-dev libargon2-dev liblzma-dev

      - name: Install liboqs
        if: matrix.language == 'c-cpp'
        run: |
          chmod +x .github/scripts/install-liboqs.sh
          INSTALL_PREFIX="${LIBOQS_PREFIX}" .github/scripts/install-liboqs.sh

      - name: Build C++ (manual)
        if: matrix.language == 'c-cpp'
        run: |
          cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DBASEFWX_REQUIRE_ARGON2=ON -DBASEFWX_REQUIRE_OQS=ON
          cmake --build cpp/build

      - name: Set up Java
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Java with Gradle
        if: matrix.language == 'java'
        working-directory: java
        run: |
          gradle --no-daemon clean build -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
